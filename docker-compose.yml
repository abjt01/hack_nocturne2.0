version: '3.8'

services:
  # ─── Core Backend (FastAPI) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthbridge-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./healthcare.db
    volumes:
      - backend_data:/app

  # ─── FHIR Microservice ──────────────────────────────────────
  fhir-service:
    build:
      context: ./services/fhir-service
    container_name: fhir-service
    ports:
      - "8001:8001"
    environment:
      - BACKEND_URL=http://backend:8000/api
    depends_on:
      - backend

  # ─── Hospital Registry ──────────────────────────────────────
  hospital-registry:
    build:
      context: ./services/hospital-registry
    container_name: hospital-registry
    ports:
      - "9001:9001"
    volumes:
      - hospital_registry_data:/app/data
    environment:
      - DATABASE_URL=/app/data/hospital_registry.db

  # ─── MPI Service ────────────────────────────────────────────
  mpi-service:
    build:
      context: ./services/mpi-service
    container_name: mpi-service
    ports:
      - "9000:9000"
    volumes:
      - mpi_data:/app/data
    environment:
      - DATABASE_PATH=/app/data/mpi.db

  # ─── Blockchain Audit Service ───────────────────────────────
  blockchain-audit-service:
    build:
      context: ./services/blockchain-audit-service
    container_name: blockchain-audit-service
    ports:
      - "8005:8005"
    volumes:
      - blockchain_data:/app/data
    env_file:
      - ./services/blockchain-audit-service/.env
    environment:
      - DATABASE_PATH=/app/data/audit_events.db

  # ─── Frontend (React) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthbridge-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  backend_data:
  hospital_registry_data:
  mpi_data:
  blockchain_data:
