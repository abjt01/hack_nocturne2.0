# Vital Platform — Multi-service Interoperability Platform

services:
  # ─── Core Backend (FastAPI) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vital-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/vital_db
      - ENCRYPTION_KEY=jeB5KNlu4QsjcL6TH_Re6s6U35ZuxEpe31kq8AvTFsE=
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_data:/app

  # ─── FHIR Microservice ──────────────────────────────────────
  fhir-service:
    build:
      context: ./services/fhir-service
    container_name: fhir-service
    ports:
      - "8001:8001"
    environment:
      - BACKEND_URL=http://backend:8000/api
    depends_on:
      backend:
        condition: service_started

  # ─── Hospital Registry ──────────────────────────────────────
  hospital-registry:
    build:
      context: ./services/hospital-registry
    container_name: hospital-registry
    ports:
      - "9001:9001"
    volumes:
      - hospital_registry_data:/app/data
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/vital_db
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Consent Service ────────────────────────────────────────
  consent-service:
    build:
      context: ./services/consent-service
    container_name: consent-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/vital_db
    depends_on:
      postgres:
        condition: service_healthy

  # ─── MPI Service ────────────────────────────────────────────
  mpi-service:
    build:
      context: ./services/mpi-service
    container_name: mpi-service
    ports:
      - "9000:9000"
    volumes:
      - mpi_data:/app/data
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/vital_db
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Blockchain Audit Service ───────────────────────────────
  blockchain-audit-service:
    build:
      context: ./services/blockchain-audit-service
    container_name: blockchain-audit-service
    ports:
      - "8005:8005"
    volumes:
      - blockchain_data:/app/data
    env_file:
      - ./services/blockchain-audit-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/vital_db
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Frontend (React) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vital-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_started

  # ─── Database (PostgreSQL) ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vital-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vital_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vital_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  backend_data:
  hospital_registry_data:
  mpi_data:
  blockchain_data:
  postgres_data:
